<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENCIMIENTO DE ITV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020a0f;
    --bg2: #050f18;
    --cyan: #00f0ff;
    --cyan-dim: #00a8b5;
    --orange: #ff6a00;
    --orange-glow: rgba(255, 106, 0, 0.4);
    --green: #00ff88;
    --red: #ff2244;
    --panel: rgba(0, 240, 255, 0.04);
    --border: rgba(0, 240, 255, 0.2);
    --text: #c8f0f8;
    --muted: #4a7a88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,240,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(255,106,0,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    margin-bottom: 50px;
    position: relative;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 8px;
  }

  .logo-bar {
    flex: 1;
    max-width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan));
  }
  .logo-bar.right { background: linear-gradient(90deg, var(--cyan), transparent); }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 4vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #fff;
    text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,240,255,0.3);
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: var(--cyan-dim);
    text-transform: uppercase;
  }

  .live-clock {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--cyan);
    margin-top: 12px;
    letter-spacing: 0.2em;
    opacity: 0.8;
  }

  /* ─── PRÓXIMAS PANEL ─── */
  .proximas-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--orange);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .proximas-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--orange), transparent);
  }

  .proximas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 50px;
  }

  @media (max-width: 600px) {
    .proximas-grid { grid-template-columns: 1fr; }
  }

  .proxima-card {
    position: relative;
    background: rgba(255, 106, 0, 0.05);
    border: 1px solid rgba(255, 106, 0, 0.5);
    padding: 24px 28px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    animation: cardIn 0.6s ease both;
  }

  .proxima-card:nth-child(2) { animation-delay: 0.15s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .proxima-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--orange);
    box-shadow: 0 0 20px var(--orange-glow);
  }

  .proxima-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,106,0,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .proxima-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(255,106,0,0.2);
  }

  .card-rank {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--orange);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .card-fecha {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,106,0,0.6);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .card-countdown {
    font-size: 0.75rem;
    color: var(--orange);
    margin-bottom: 18px;
    letter-spacing: 0.1em;
  }

  .card-sep {
    height: 1px;
    background: rgba(255,106,0,0.2);
    margin-bottom: 14px;
  }

  .card-field {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .field-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field-value {
    font-size: 0.95rem;
    color: var(--text);
    text-align: right;
  }

  .field-value.matricula {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--cyan);
    letter-spacing: 0.1em;
  }

  .field-value.contrata {
    color: var(--orange);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  /* Corner decorations */
  .corner { position: absolute; width: 12px; height: 12px; }
  .corner.tr { top: 8px; right: 8px; border-top: 1px solid var(--orange); border-right: 1px solid var(--orange); }
  .corner.br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--orange); border-right: 1px solid var(--orange); }

  /* ─── TABLE SECTION ─── */
  .table-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--cyan);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .table-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--cyan-dim), transparent);
  }

  .table-wrapper {
    border: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: visible;
    background: var(--panel);
    position: relative;
    -webkit-overflow-scrolling: touch;
  }

  .table-wrapper::-webkit-scrollbar {
    height: 4px;
  }
  .table-wrapper::-webkit-scrollbar-track {
    background: rgba(0,240,255,0.05);
  }
  .table-wrapper::-webkit-scrollbar-thumb {
    background: var(--cyan-dim);
    border-radius: 0;
  }

  .table-wrapper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  table {
    width: 100%;
    min-width: 600px;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead tr {
    background: rgba(0,240,255,0.07);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--cyan-dim);
    padding: 14px 16px;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(0,240,255,0.06);
    transition: background 0.2s;
    animation: rowFade 0.4s ease both;
  }

  tbody tr:hover {
    background: rgba(0,240,255,0.06);
  }

  tbody tr.past {
    opacity: 0.35;
  }

  tbody tr.urgent td:first-child {
    border-left: 2px solid var(--red);
  }

  tbody tr.soon td:first-child {
    border-left: 2px solid var(--orange);
  }

  td {
    padding: 11px 16px;
    color: var(--text);
    white-space: nowrap;
  }

  td.fecha {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: #fff;
  }

  td.matricula {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    color: var(--cyan);
    letter-spacing: 0.1em;
  }

  td.contrata {
    color: var(--cyan-dim);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
  }

  .badge {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    padding: 2px 7px;
    border-radius: 0;
    font-family: 'Orbitron', sans-serif;
  }
  .badge.urgent { background: rgba(255,34,68,0.15); color: var(--red); border: 1px solid rgba(255,34,68,0.4); }
  .badge.soon { background: rgba(255,106,0,0.15); color: var(--orange); border: 1px solid rgba(255,106,0,0.4); }
  .badge.ok { background: rgba(0,255,136,0.08); color: var(--green); border: 1px solid rgba(0,255,136,0.25); }
  .badge.past { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }

  .scan-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes scan {
    0%   { top: 0; }
    100% { top: 100vh; }
  }

  @keyframes rowFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .flicker {
    animation: flicker 8s linear infinite;
  }
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.85; }
  }

  @media (max-width: 700px) {
    td, th { padding: 9px 10px; font-size: 0.72rem; }
    .card-fecha { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="scan-line"></div>

<div class="container">

  <header>
    <div class="logo-line">
      <div class="logo-bar"></div>
      <h1 class="flicker">VENCIMIENTO DE ITV</h1>
      <div class="logo-bar right"></div>
    </div>
    <div class="subtitle">Sistema de Control de Inspección Técnica de Vehículos</div>
    <div class="live-clock" id="clock">──────────────</div>
  </header>

  <div class="proximas-label">▸ PRÓXIMAS INSPECCIONES CRÍTICAS</div>
  <div class="proximas-grid" id="proximas"></div>

  <div class="table-label">▸ REGISTRO COMPLETO — ORDENADO POR FECHA</div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>FECHA</th>
          <th>MATRÍCULA</th>
          <th>VEHÍCULO</th>
          <th>CONTRATA</th>
          <th>ESTADO</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
const RAW = [
  ["24/08/2025","6874 FWS","JAMPER","LLANES"],
  ["05/09/2025","2153 DMK","KANGOO","LLANES"],
  ["19/12/2025","E 2725 BGJ","LMV","ARRIONDAS"],
  ["06/02/2026","0049 GVP","IVECO MUEBLES","RIBADESELLA"],
  ["07/02/2026","1724 JJX","COMPACAR","RIBADESELLA"],
  ["06/09/2026","2068 GRC","LIMP FACHADAS","RIBADESELLA"],
  ["06/03/2026","3341 GKX","IVECO RECOLECTOR","RIBADESELLA"],
  ["17/03/2026","0343 DTF","NISSAN CONTENEDO","LLANES"],
  ["22/03/2026","4773 CRL","COMPACAR","PEÑAMELLERA"],
  ["24/03/2026","3235 JLZ","MAN RECOLECTOR","RIBADESELLA"],
  ["25/03/2026","0903 HYF","LIMP. FACHADAS","ARRIONDAS"],
  ["26/03/2026","7575 GKL","KANGOO","RIBADESELLA"],
  ["26/03/2026","1101 DTF","RELECTOR","RIBADESELLA"],
  ["02/04/2026","3939 CPJ","CUBA ARRIONDAS","RIBADESELLA"],
  ["23/04/2026","6055 DRY","CUBA","LLANES"],
  ["30/04/2026","2393 CFV","PIAGGIO","RIBADESELLA"],
  ["04/05/2026","7674 HBP","TOYOTA","LLANES"],
  ["11/05/2026","3494 FCM","LAVA CONTENEDOR","OVIEDO"],
  ["17/05/2026","0139 DFN","SCANIA","PEÑAMELLERA"],
  ["21/05/2026","8847 GPB","MOTO-CARRO","RIBADESELLA"],
  ["23/05/2026","0352 DTF","NISSAN MUEBLES","RIBADESELLA"],
  ["24/05/2026","E 8921 BBY","CRIVA","LLANES"],
  ["07/06/2026","3256 KLS","TOYOTA HILUX","COLUNGA"],
  ["23/06/2026","M 8636 XH","SCANIA","PEÑAMELLERA"],
  ["28/06/2026","E 1684 BGP","LMV MATHIEU","RIBADESELLA"],
  ["16/07/2026","0511 FXD","NISSAN MUEBLES","RIBADESELLA"],
  ["20/07/2026","6555 DSJ","BAUL","RIBADESELLA"],
  ["23/07/2026","E 6429 BFK","BARREDORA CITY","LLANES"],
  ["26/07/2026","7330 FWX","KANGOO","LLANES"],
  ["29/07/2026","E 7232 BCN","BARREDORA RAVO","RIBADESELLA"],
  ["31/07/2026","E 5328 BGM","BARREDORA","RIBADESELLA"],
  ["05/08/2026","9542 KTK","MAN RECOLECTOR","COLUNGA"],
  ["21/08/2026","3942 JRZ","CUBA ISUZU","RIBADESELLA"],
  ["29/08/2026","E 9023 BGK","CMAR","RIBADESELLA"],
  ["05/09/2026","7358 FWX","KANGOO BRIGADA","LLANES"],
  ["13/11/2026","5186 MWH","INVICTA","LLANES"],
  ["13/11/2026","5188 MWH","INVICTA","LLANES"],
  ["13/12/2026","3702 MXB","BAUL - FUSO","LLANES"],
  ["24/01/2027","4888 MXY","ISUZU","LLANES"],
  ["12/02/2027","4026 MYJ","LIMPIA FACHADAS","LLANES"],
  ["14/03/2027","6156 BGX","BARREDORA MATHIEU","COLUNGA"],
  ["24/07/2028","E 3334 BHZ","BARREDORA CITY","LLANES"],
  ["04/09/2028","E-6887 BHZ","CMAR","LLANES"],
  ["26/09/2028","E 8944 BHZ","LMV MATHIEU","LLANES"],
];

function parseDate(str) {
  const [d,m,y] = str.trim().split('/');
  return new Date(+y, +m-1, +d);
}

function daysFrom(date, now) {
  const diff = date - now;
  return Math.ceil(diff / 86400000);
}

function formatDate(str) { return str.trim(); }

function getStatus(days) {
  if (days < 0)   return { cls: 'past',   badge: 'VENCIDA',        bcls: 'past'   };
  if (days <= 30) return { cls: 'urgent', badge: '⚠ URGENTE',      bcls: 'urgent' };
  if (days <= 90) return { cls: 'soon',   badge: '◉ PRÓXIMA',      bcls: 'soon'   };
  return            { cls: '',      badge: '✓ OK',            bcls: 'ok'     };
}

function countdownText(days) {
  if (days < 0)  return `VENCIDA HACE ${Math.abs(days)} DÍAS`;
  if (days === 0) return `VENCE HOY`;
  if (days === 1) return `VENCE MAÑANA`;
  return `VENCE EN ${days} DÍAS`;
}

function init() {
  const now = new Date();
  now.setHours(0,0,0,0);

  const data = RAW.map(([fecha, matricula, vehiculo, contrata]) => {
    const date = parseDate(fecha);
    const days = daysFrom(date, now);
    return { fecha, matricula, vehiculo, contrata, date, days };
  }).sort((a,b) => a.date - b.date);

  // Find 2 nearest upcoming (or soonest upcoming)
  const upcoming = data.filter(r => r.days >= 0);
  const proximas = upcoming.slice(0, 2);

  // Render proximas
  const pg = document.getElementById('proximas');
  proximas.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'proxima-card';
    card.innerHTML = `
      <div class="corner tr"></div>
      <div class="corner br"></div>
      <div class="card-rank">${i === 0 ? '▶ INSPECCIÓN #1' : '▶ INSPECCIÓN #2'}</div>
      <div class="card-fecha">${formatDate(r.fecha)}</div>
      <div class="card-countdown">${countdownText(r.days)}</div>
      <div class="card-sep"></div>
      <div class="card-field">
        <span class="field-label">MATRÍCULA</span>
        <span class="field-value matricula">${r.matricula}</span>
      </div>
      <div class="card-field">
        <span class="field-label">VEHÍCULO</span>
        <span class="field-value">${r.vehiculo}</span>
      </div>
      <div class="card-field">
        <span class="field-label">CONTRATA</span>
        <span class="field-value contrata">${r.contrata}</span>
      </div>
    `;
    pg.appendChild(card);
  });

  // Render table
  const tbody = document.getElementById('tbody');
  data.forEach((r, idx) => {
    const st = getStatus(r.days);
    const tr = document.createElement('tr');
    if (st.cls) tr.classList.add(st.cls);
    tr.style.animationDelay = (idx * 0.02) + 's';
    tr.innerHTML = `
      <td class="fecha">${formatDate(r.fecha)}</td>
      <td class="matricula">${r.matricula}</td>
      <td>${r.vehiculo}</td>
      <td class="contrata">${r.contrata}</td>
      <td><span class="badge ${st.bcls}">${st.badge}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// Clock
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const days = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  document.getElementById('clock').textContent =
    `${days[now.getDay()]}  ${pad(now.getDate())} ${months[now.getMonth()]} ${now.getFullYear()}  ·  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

init();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
